<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to Saturday</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Mono:wght@300;400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c842;
    --dark: #0a0a0f;
    --mid: #13131e;
    --rose: #ff6b9d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(245,200,66,0.07) 0%, transparent 70%);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}
    50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  }

  .stars { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0; }
  .star {
    position:absolute;background:#fff;border-radius:50%;
    animation:twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.7}}

  .container {
    position:relative;z-index:10;text-align:center;
    padding:30px 20px;display:flex;flex-direction:column;
    align-items:center;
  }

  .label-top {
    font-size:0.7rem;letter-spacing:0.45em;text-transform:uppercase;
    color:var(--gold);opacity:0.8;margin-bottom:12px;
    animation:fadeDown 1s ease both;
  }
  .title {
    font-family:'Playfair Display',serif;
    font-size:clamp(2.2rem,7vw,5rem);font-weight:900;line-height:1;
    background:linear-gradient(135deg,#fff 30%,var(--gold) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:8px;animation:fadeDown 1s 0.2s ease both;
  }
  .subtitle {
    font-size:0.8rem;letter-spacing:0.25em;color:rgba(255,255,255,0.35);
    margin-bottom:44px;animation:fadeDown 1s 0.4s ease both;
  }

  .countdown {
    display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
    margin-bottom:50px;animation:fadeUp 1s 0.6s ease both;
  }
  .unit{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box {
    background:var(--mid);border:1px solid rgba(245,200,66,0.2);border-radius:12px;
    width:clamp(72px,16vw,110px);height:clamp(72px,16vw,110px);
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
    box-shadow:0 0 30px rgba(245,200,66,0.05),inset 0 1px 0 rgba(255,255,255,0.05);
    transition:border-color 0.3s;
  }
  .box:hover{border-color:rgba(245,200,66,0.5);}
  .box::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4;
  }
  .number {
    font-family:'Playfair Display',serif;
    font-size:clamp(1.8rem,5vw,3rem);font-weight:900;color:var(--gold);line-height:1;
  }
  .number.flip{animation:flipNum 0.3s ease;}
  @keyframes flipNum{0%{transform:translateY(-8px);opacity:0}100%{transform:translateY(0);opacity:1}}
  .unit-label{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
  .dot{font-size:1.8rem;color:rgba(245,200,66,0.3);align-self:center;padding-bottom:20px;}

  .env-btn-wrap{animation:fadeUp 1s 0.9s ease both;margin-bottom:24px;}

  .env-btn {
    background:linear-gradient(135deg,rgba(255,107,157,0.15),rgba(245,200,66,0.1));
    border:1px solid rgba(255,107,157,0.4);border-radius:100px;
    padding:14px 32px;color:var(--rose);
    font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:0.2em;
    text-transform:uppercase;cursor:pointer;
    transition:all 0.3s ease;display:flex;align-items:center;gap:12px;
  }
  .env-btn:hover {
    background:linear-gradient(135deg,rgba(255,107,157,0.25),rgba(245,200,66,0.15));
    border-color:rgba(255,107,157,0.7);transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(255,107,157,0.2);
  }
  .env-btn svg{transition:transform 0.3s;}
  .env-btn:hover svg{transform:scale(1.15) rotate(-5deg);}

  .event-date{
    font-size:0.7rem;letter-spacing:0.5em;text-transform:uppercase;
    color:rgba(255,255,255,0.25);margin-bottom:12px;
    animation:fadeUp 1s 1.1s ease both;
  }
  .saturday-badge {
    display:inline-flex;align-items:center;gap:10px;
    background:linear-gradient(135deg,rgba(245,200,66,0.08),rgba(245,200,66,0.04));
    border:1px solid rgba(245,200,66,0.25);border-radius:100px;
    padding:10px 24px;font-family:'Playfair Display',serif;
    font-size:0.95rem;color:var(--gold);
    animation:fadeUp 1s 1.2s ease both;
  }
  .dot-icon{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:blink 1.5s ease infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

  .arrived-msg{
    display:none;font-family:'Playfair Display',serif;
    font-size:clamp(2rem,6vw,4rem);font-weight:900;
    background:linear-gradient(135deg,var(--gold),#fff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:glow 2s ease infinite alternate;margin-bottom:20px;
  }
  @keyframes glow{from{filter:drop-shadow(0 0 10px rgba(245,200,66,0.5))}to{filter:drop-shadow(0 0 30px rgba(245,200,66,0.9))}}

  @keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* PASSWORD MODAL */
  .pw-overlay {
    display:none;position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);
    align-items:center;justify-content:center;
  }
  .pw-overlay.open{display:flex;animation:fadeOverlay 0.3s ease;}
  @keyframes fadeOverlay{from{opacity:0}to{opacity:1}}

  .pw-box {
    background:linear-gradient(135deg,#1a0d12,#130d1a);
    border:1px solid rgba(255,107,157,0.3);border-radius:20px;
    padding:36px 32px;text-align:center;
    width:min(320px,90vw);
    animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(255,107,157,0.08);
  }
  @keyframes popIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}

  .pw-lock-icon{font-size:2.5rem;margin-bottom:12px;animation:wobble 2s ease infinite;}
  @keyframes wobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-4deg)}80%{transform:rotate(4deg)}}

  .pw-title{
    font-family:'Playfair Display',serif;font-size:1.4rem;
    color:#fff;margin-bottom:6px;
  }
  .pw-hint{
    font-size:0.75rem;letter-spacing:0.15em;
    color:rgba(255,255,255,0.4);margin-bottom:24px;
    font-family:'DM Mono',monospace;
  }
  .pw-hint strong{
    color:var(--rose);font-size:0.95rem;letter-spacing:0.25em;
  }

  .pw-input-wrap{position:relative;margin-bottom:16px;}
  .pw-input {
    width:100%;padding:14px 18px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,107,157,0.25);
    border-radius:12px;color:#fff;
    font-family:'DM Mono',monospace;font-size:1.2rem;
    letter-spacing:0.4em;text-align:center;
    outline:none;transition:border-color 0.3s,box-shadow 0.3s;
  }
  .pw-input:focus{
    border-color:rgba(255,107,157,0.6);
    box-shadow:0 0 20px rgba(255,107,157,0.15);
  }
  .pw-input.error{
    border-color:#ff4444;box-shadow:0 0 15px rgba(255,68,68,0.2);
    animation:shake 0.4s ease;
  }
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

  .pw-error-msg{
    font-size:0.7rem;color:#ff6b6b;letter-spacing:0.1em;
    height:16px;margin-bottom:12px;transition:opacity 0.3s;
  }

  .pw-submit {
    width:100%;padding:13px;
    background:linear-gradient(135deg,#e91e8c,#ff6b9d);
    border:none;border-radius:12px;
    color:#fff;font-family:'DM Mono',monospace;
    font-size:0.85rem;letter-spacing:0.2em;text-transform:uppercase;
    cursor:pointer;transition:all 0.3s;
    box-shadow:0 4px 20px rgba(233,30,140,0.3);
  }
  .pw-submit:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(233,30,140,0.4);}
  .pw-submit:active{transform:translateY(0);}

  .pw-cancel{
    margin-top:14px;font-size:0.65rem;letter-spacing:0.2em;
    color:rgba(255,255,255,0.25);cursor:pointer;transition:color 0.3s;
    text-transform:uppercase;
  }
  .pw-cancel:hover{color:rgba(255,255,255,0.5);}

  .confetti-piece{
    position:fixed;width:8px;height:8px;top:-20px;border-radius:2px;
    animation:fall linear forwards;pointer-events:none;
  }
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

  @media(max-width:480px){.dot{display:none}.countdown{gap:8px}}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="label-top">✦ Something Special ✦</div>
  <div class="title">Almost There</div>
  <div class="subtitle">Saturday · 28 February 2026</div>

  <div class="countdown" id="countdown">
    <div class="unit">
      <div class="box"><span class="number" id="days">00</span></div>
      <div class="unit-label">Days</div>
    </div>
    <div class="dot">:</div>
    <div class="unit">
      <div class="box"><span class="number" id="hours">00</span></div>
      <div class="unit-label">Hours</div>
    </div>
    <div class="dot">:</div>
    <div class="unit">
      <div class="box"><span class="number" id="mins">00</span></div>
      <div class="unit-label">Minutes</div>
    </div>
    <div class="dot">:</div>
    <div class="unit">
      <div class="box"><span class="number" id="secs">00</span></div>
      <div class="unit-label">Seconds</div>
    </div>
  </div>

  <div class="arrived-msg" id="arrivedMsg">🎉 Saturday is Here! 🎉</div>

  <!-- Button - always unlocked, no date restriction -->
  <div class="env-btn-wrap">
    <button class="env-btn" onclick="openPwModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <span>Open Your Surprise</span>
    </button>
  </div>

  <div class="event-date">Arriving on</div>
  <div class="saturday-badge">
    <div class="dot-icon"></div>
    Saturday, 28 February 2026
    <div class="dot-icon"></div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-lock-icon">🔐</div>
    <div class="pw-title">Enter Password</div>
    <div class="pw-hint">Hint: <strong>Last</strong></div>
    <div class="pw-input-wrap">
      <input
        class="pw-input"
        id="pwInput"
        type="password"
        maxlength="10"
        placeholder="· · · ·"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') checkPassword()"
      />
    </div>
    <div class="pw-error-msg" id="pwError"></div>
    <button class="pw-submit" onclick="checkPassword()">Open 💌</button>
    <div class="pw-cancel" onclick="closePwModal()">Cancel</div>
  </div>
</div>

<script>
  // STARS
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;`;
    starsEl.appendChild(s);
  }

  // COUNTDOWN
  const target = new Date('2026-02-28T00:00:00');
  const daysEl  = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minsEl  = document.getElementById('mins');
  const secsEl  = document.getElementById('secs');

  function pad(n){ return String(n).padStart(2,'0'); }

  function animateNum(el, val){
    const v = pad(val);
    if(el.textContent !== v){
      el.classList.remove('flip'); void el.offsetWidth;
      el.classList.add('flip'); el.textContent = v;
    }
  }

  function tick(){
    const now = new Date();
    const diff = target - now;
    if(diff <= 0){
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('arrivedMsg').style.display = 'block';
    } else {
      animateNum(daysEl,  Math.floor(diff / 86400000));
      animateNum(hoursEl, Math.floor((diff % 86400000) / 3600000));
      animateNum(minsEl,  Math.floor((diff % 3600000) / 60000));
      animateNum(secsEl,  Math.floor((diff % 60000) / 1000));
    }
  }
  tick();
  setInterval(tick, 1000);

  // PASSWORD MODAL
  function openPwModal(){
    document.getElementById('pwOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pwInput').focus(), 300);
  }
  function closePwModal(){
    document.getElementById('pwOverlay').classList.remove('open');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').textContent = '';
    document.getElementById('pwInput').classList.remove('error');
  }

  document.getElementById('pwOverlay').addEventListener('click', function(e){
    if(e.target === this) closePwModal();
  });

  // Valid passwords: 45, SR 7, 21, 27
  const validPasswords = ['45', 'SR 7', 'sr 7', 'SR7', 'sr7', '21', '27'];

  function checkPassword(){
    const val = document.getElementById('pwInput').value.trim();
    const inp = document.getElementById('pwInput');
    const err = document.getElementById('pwError');

    if(validPasswords.includes(val)){
      closePwModal();
      launchConfetti();
      setTimeout(() => {
        window.open('https://75raj.github.io/chl/', '_blank');
      }, 600);
    } else {
      inp.classList.remove('error');
      void inp.offsetWidth;
      inp.classList.add('error');
      err.textContent = '✗ Wrong password. Try again.';
      setTimeout(() => inp.classList.remove('error'), 500);
    }
  }

  // CONFETTI
  function launchConfetti(){
    const colors = ['#f5c842','#ff6b9d','#fff','#4ecdc4','#ff4081','#c2185b'];
    for(let i = 0; i < 90; i++){
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${(Math.random()*2+2).toFixed(1)}s;animation-delay:${(Math.random()*2).toFixed(1)}s;transform:rotate(${Math.random()*360}deg);`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }
  }
</script>
</body>
</html>
